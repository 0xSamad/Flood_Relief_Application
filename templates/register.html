{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="padding: 40px; border-radius: 16px; text-align: center;">
    <div style="margin-bottom: 30px;">
        <i class="fa-solid fa-user-plus" style="font-size: 40px; color: var(--accent-primary); margin-bottom: 10px;"></i>
        <h2 style="font-family: var(--font-heading); font-size: 28px;">Create Account</h2>
        <p style="color: var(--text-secondary);">Join the Flood Relief Management System</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
        <div>
            <label style="font-weight: 500; font-size: 14px; color: var(--text-secondary);">Full Name</label>
            <input type="text" name="name" required style="width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-family: var(--font-main);">
        </div>
        <div>
            <label style="font-weight: 500; font-size: 14px; color: var(--text-secondary);">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-family: var(--font-main);">
        </div>
        <div>
            <label style="font-weight: 500; font-size: 14px; color: var(--text-secondary);">City</label>
            <input type="text" name="city" required style="width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-family: var(--font-main);">
        </div>
        <div>
            <label style="font-weight: 500; font-size: 14px; color: var(--text-secondary);">Phone Number</label>
            <input type="text" name="phone" required style="width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-family: var(--font-main);">
        </div>
        <div style="grid-column: 1 / -1;">
            <label style="font-weight: 500; font-size: 14px; color: var(--text-secondary);">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-family: var(--font-main);">
        </div>
        
        <div style="grid-column: 1 / -1; margin-top: 10px;">
            <button type="submit" class="btn" style="width: 100%; background: var(--accent-primary); color: white; padding: 12px; font-size: 16px;">Register</button>
        </div>
    </form>
    
    <div style="margin-top: 25px; color: var(--text-secondary); font-size: 14px;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Sign In</a>
    </div>
</div>
{% endblock %}
